<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Visualização SVG Referência</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      background: white;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    img {
      display: block;
      max-width: 100%;
      height: auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Referência SVG (1080x1080)</h2>
    <img src="estatisticas.svg" alt="Design de referência">
  </div>
</body>
</html>
